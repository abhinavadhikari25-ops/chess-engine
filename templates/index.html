<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chess Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <h1>Pro Chess AI</h1>
    <div class="controls">
        Difficulty: 
        <select id="difficulty">
            <option value="1">Easy (Random)</option>
            <option value="2">Medium (Greedy)</option>
            <option value="3" selected>Hard (Minimax)</option>
        </select>
        <button onclick="resetGame()">New Game</button>
        <p>Live Eval: <span id="eval" class="status">0.0</span></p>
    </div>
    
    <div id="white-graveyard" class="graveyard"></div>
    
    <div id="board"></div>

    <div id="black-graveyard" class="graveyard"></div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script src="/static/js/script.js"></script>
</body>
</html>
